name: Release

on:
  push:
    tags:
      - release-v*.*.*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build tagged release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"

          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "This workflow only builds tagged releases."
            exit 0
          fi

          if [[ ! "$tag_name" =~ ^release-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "Tag '$tag_name' does not match release-vX.Y.Z."
            exit 0
          fi

          version="${tag_name#release-}"
          release_title="release ${version}"
          previous_tag="$(git tag --list 'release-v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Fvx "$tag_name" | head -n 1)"

          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${tag_name}"
          else
            range="${tag_name}"
          fi

          {
            echo "## Changes"
            echo
            git log --pretty=format:'- %s (%h)' "$range"
            echo
          } > release_notes.md

          echo "release_created=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_title=$release_title" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libglfw3-dev \
            pkg-config \
            xorg-dev

      - name: Configure
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: cmake --build build --config Release --parallel

      - name: Package artifact
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          mkdir -p dist/physics-simulations-${{ steps.release.outputs.version }}
          cp build/physics-simulations dist/physics-simulations-${{ steps.release.outputs.version }}/
          cp -R shaders dist/physics-simulations-${{ steps.release.outputs.version }}/
          cp README.md LICENSE dist/physics-simulations-${{ steps.release.outputs.version }}/
          tar -C dist -czf dist/physics-simulations-${{ steps.release.outputs.version }}-linux-x86_64.tar.gz physics-simulations-${{ steps.release.outputs.version }}

      - name: Create GitHub release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release.outputs.tag_name }}" \
            dist/*.tar.gz \
            --title "${{ steps.release.outputs.release_title }}" \
            --notes-file release_notes.md
