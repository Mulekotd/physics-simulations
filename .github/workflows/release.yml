name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release from commits
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

  build:
    name: Build release artifact
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libglfw3-dev \
            pkg-config \
            xorg-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package artifact
        run: |
          mkdir -p dist/physics-simulations-${{ needs.release.outputs.tag_name }}
          cp build/physics-simulations dist/physics-simulations-${{ needs.release.outputs.tag_name }}/
          cp -R shaders dist/physics-simulations-${{ needs.release.outputs.tag_name }}/
          cp README.md LICENSE dist/physics-simulations-${{ needs.release.outputs.tag_name }}/
          tar -C dist -czf dist/physics-simulations-${{ needs.release.outputs.tag_name }}-linux-x86_64.tar.gz physics-simulations-${{ needs.release.outputs.tag_name }}

      - name: Upload artifact to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release.outputs.tag_name }}" dist/*.tar.gz --clobber
