name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release from commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve next version
        id: version
        shell: bash
        run: |
          if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "HEAD already has a tag; skipping release."
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ -n "$latest_tag" ]; then
            range="${latest_tag}..HEAD"
            version="${latest_tag#v}"
          else
            range="HEAD"
            version="0.0.0"
          fi

          if [ -z "$(git log --format=%H "$range")" ]; then
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "No commits to release."
            exit 0
          fi

          messages="$(git log --format=%B "$range")"

          if grep -Eq '(^|[[:space:]])BREAKING CHANGE:' <<< "$messages" ||
             grep -Eq '^[a-zA-Z]+(\([^)]+\))?!:' <<< "$messages"; then
            bump="major"
          elif grep -Eiq '^feat(\([^)]+\))?:' <<< "$messages"; then
            bump="minor"
          else
            bump="patch"
          fi

          IFS='.' read -r major minor patch <<< "$version"

          if [ "$version" = "0.0.0" ]; then
            if [ "$bump" = "major" ]; then
              major=1
              minor=0
              patch=0
            else
              major=0
              minor=1
              patch=0
            fi
          elif [ "$bump" = "major" ]; then
            major=$((major + 1))
            minor=0
            patch=0
          elif [ "$bump" = "minor" ]; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          tag_name="v${major}.${minor}.${patch}"

          {
            echo "## Changes"
            echo
            git log --pretty=format:'- %s (%h)' "$range"
            echo
          } > release_notes.md

          echo "release_created=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "Next release: $tag_name"

      - name: Install system dependencies
        if: ${{ steps.version.outputs.release_created == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libglfw3-dev \
            pkg-config \
            xorg-dev

      - name: Configure
        if: ${{ steps.version.outputs.release_created == 'true' }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        if: ${{ steps.version.outputs.release_created == 'true' }}
        run: cmake --build build --config Release --parallel

      - name: Package artifact
        if: ${{ steps.version.outputs.release_created == 'true' }}
        run: |
          mkdir -p dist/physics-simulations-${{ steps.version.outputs.tag_name }}
          cp build/physics-simulations dist/physics-simulations-${{ steps.version.outputs.tag_name }}/
          cp -R shaders dist/physics-simulations-${{ steps.version.outputs.tag_name }}/
          cp README.md LICENSE dist/physics-simulations-${{ steps.version.outputs.tag_name }}/
          tar -C dist -czf dist/physics-simulations-${{ steps.version.outputs.tag_name }}-linux-x86_64.tar.gz physics-simulations-${{ steps.version.outputs.tag_name }}

      - name: Create GitHub release
        if: ${{ steps.version.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag_name }}"
          git push origin "${{ steps.version.outputs.tag_name }}"
          gh release create "${{ steps.version.outputs.tag_name }}" \
            dist/*.tar.gz \
            --title "${{ steps.version.outputs.tag_name }}" \
            --notes-file release_notes.md
